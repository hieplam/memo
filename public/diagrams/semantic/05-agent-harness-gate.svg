<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="LLM sinh code, một cổng gồm compiler type-checker và lint dựa trên AST kiểm tra; code sai bị chặn exit 1; lời dặn trong markdown thì LLM đi vòng qua được; grammar-constrained decoding nằm ở khâu sinh token, khác với cổng hậu kiểm">
  <style>
    .title { fill:#0f172a; font-size:23px; font-weight:700; }
    .sub   { fill:#64748b; font-size:13px; }
    .ph    { font-size:14px; font-weight:700; }
    .mono  { font-family:'SF Mono','Cascadia Code',Consolas,monospace; font-size:11.5px; }
    .meta  { fill:#475569; font-size:12px; }
    .note  { fill:#64748b; font-size:12.5px; }
    .llm   { fill:#eef2ff; stroke:#6366f1; stroke-width:2; }
    .gate  { fill:#ecfdf5; stroke:#10b981; stroke-width:2; }
    .pass  { fill:#10b981; }
    .fail  { fill:#ef4444; }
    .soft  { fill:#fff7ed; stroke:#f59e0b; stroke-width:1.5; stroke-dasharray:5 4; }
  </style>

  <text class="title" x="30" y="40">Ghì cương agent: cổng bằng máy, không bằng lời dặn</text>
  <text class="sub" x="30" y="64">LLM sinh code thoải mái — nhưng phải lọt qua CỔNG (compile + type + lint AST) mới được nhận.</text>

  <!-- LLM -->
  <rect class="llm" x="30" y="110" width="170" height="92" rx="12"/>
  <text class="ph" x="115" y="150" text-anchor="middle" fill="#4338ca">LLM agent</text>
  <text class="meta" x="115" y="172" text-anchor="middle">sinh code</text>
  <text class="mono" x="115" y="190" text-anchor="middle" fill="#6366f1">(tự do, hay sai)</text>

  <line x1="204" y1="156" x2="246" y2="156" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

  <!-- GATE -->
  <rect class="gate" x="250" y="96" width="300" height="120" rx="12"/>
  <text class="ph" x="400" y="124" text-anchor="middle" fill="#047857">CỔNG — hard rule bằng máy</text>
  <text class="mono" x="270" y="150" fill="#065f46">• compiler / type-checker</text>
  <text class="mono" x="270" y="172" fill="#065f46">• lint dựa trên AST + semantic</text>
  <text class="mono" x="270" y="194" fill="#065f46">• build gate → exit 1 nếu sai</text>

  <!-- outcomes -->
  <line x1="554" y1="130" x2="610" y2="130" stroke="#10b981" stroke-width="2" marker-end="url(#g)"/>
  <rect x="614" y="110" width="256" height="42" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <circle cx="636" cy="131" r="8" class="pass"/>
  <text class="mono" x="652" y="136" fill="#047857">đúng → vào codebase</text>

  <line x1="554" y1="184" x2="610" y2="184" stroke="#ef4444" stroke-width="2" marker-end="url(#r)"/>
  <rect x="614" y="164" width="256" height="42" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <circle cx="636" cy="185" r="8" class="fail"/>
  <text class="mono" x="652" y="190" fill="#b91c1c">sai → chặn, bắt sửa lại</text>

  <!-- contrast: instruction -->
  <rect class="soft" x="30" y="250" width="520" height="86" rx="12"/>
  <text class="ph" x="50" y="276" fill="#b45309">Đối lập: “lời dặn” (markdown / prompt rule)</text>
  <text class="meta" x="50" y="300">“Nhớ đừng xài os.Getenv nha…” — không có gì CHẶN.</text>
  <text class="meta" x="50" y="320">LLM bắt chước code xung quanh, dặn xong vẫn đi vòng qua.</text>

  <text x="585" y="295" font-size="34" fill="#f59e0b">→ ?</text>
  <text class="meta" x="640" y="290">đi vòng được</text>
  <text class="meta" x="640" y="308">= không hiệu lực</text>

  <!-- note on grammar-constrained decoding -->
  <rect x="30" y="356" width="840" height="92" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="50" y="382" font-size="13.5" font-weight="700" fill="#0f172a">Đừng nhầm với grammar-constrained decoding (ép lúc SINH token):</text>
  <text class="note" x="50" y="406">Cái đó ép từng token sinh ra phải hợp ngữ pháp — chặn rác CÚ PHÁP ngay lúc đẻ. Bổ trợ, không thay thế.</text>
  <text class="note" x="50" y="426">Cổng AST/type ở trên là HẬU KIỂM: bắt cái sai NGỮ NGHĨA (gọi hàm không có, phá hợp đồng) mà cú pháp vẫn “đúng”.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#10b981"/></marker>
    <marker id="r" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#ef4444"/></marker>
  </defs>
</svg>
