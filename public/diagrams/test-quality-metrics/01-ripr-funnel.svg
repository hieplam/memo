<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="40" y="50" font-size="26" font-weight="700" fill="#0f172a">Why coverage can&#8217;t prove a test catches bugs</text>
  <text x="40" y="78" font-size="15" fill="#475569">A test only reveals a fault if it passes ALL FOUR gates (the R-I-P-R model). Coverage proves only the first.</text>

  <!-- Stage boxes -->
  <!-- Reachability -->
  <g>
    <rect x="40" y="120" width="200" height="300" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="140" y="156" font-size="18" font-weight="700" fill="#b91c1c" text-anchor="middle">1. Reachability</text>
    <text x="140" y="182" font-size="13" fill="#7f1d1d" text-anchor="middle">The test executes</text>
    <text x="140" y="200" font-size="13" fill="#7f1d1d" text-anchor="middle">the faulty line.</text>
    <rect x="64" y="232" width="152" height="40" rx="8" fill="#dc2626"/>
    <text x="140" y="257" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">COVERAGE</text>
    <text x="140" y="300" font-size="12" fill="#7f1d1d" text-anchor="middle">Line / statement /</text>
    <text x="140" y="316" font-size="12" fill="#7f1d1d" text-anchor="middle">branch coverage</text>
    <text x="140" y="332" font-size="12" fill="#7f1d1d" text-anchor="middle">stops measuring HERE.</text>
    <text x="140" y="380" font-size="34" text-anchor="middle">&#128683;</text>
    <text x="140" y="405" font-size="11" fill="#7f1d1d" text-anchor="middle">100% covered = only gate 1</text>
  </g>

  <!-- Infection -->
  <g>
    <rect x="260" y="120" width="200" height="300" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <text x="360" y="156" font-size="18" font-weight="700" fill="#b45309" text-anchor="middle">2. Infection</text>
    <text x="360" y="186" font-size="13" fill="#78350f" text-anchor="middle">The bug corrupts the</text>
    <text x="360" y="204" font-size="13" fill="#78350f" text-anchor="middle">program state at</text>
    <text x="360" y="222" font-size="13" fill="#78350f" text-anchor="middle">that point.</text>
    <text x="360" y="300" font-size="12" fill="#78350f" text-anchor="middle">Executing a line is not</text>
    <text x="360" y="318" font-size="12" fill="#78350f" text-anchor="middle">enough &#8212; the input must</text>
    <text x="360" y="336" font-size="12" fill="#78350f" text-anchor="middle">actually trigger the defect.</text>
  </g>

  <!-- Propagation -->
  <g>
    <rect x="480" y="120" width="200" height="300" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="580" y="156" font-size="18" font-weight="700" fill="#1d4ed8" text-anchor="middle">3. Propagation</text>
    <text x="580" y="186" font-size="13" fill="#1e3a8a" text-anchor="middle">The corrupted state</text>
    <text x="580" y="204" font-size="13" fill="#1e3a8a" text-anchor="middle">reaches an observable</text>
    <text x="580" y="222" font-size="13" fill="#1e3a8a" text-anchor="middle">output.</text>
    <text x="580" y="300" font-size="12" fill="#1e3a8a" text-anchor="middle">A wrong value buried in</text>
    <text x="580" y="318" font-size="12" fill="#1e3a8a" text-anchor="middle">a local that never leaves</text>
    <text x="580" y="336" font-size="12" fill="#1e3a8a" text-anchor="middle">the method is invisible.</text>
  </g>

  <!-- Reveal -->
  <g>
    <rect x="700" y="120" width="220" height="300" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="810" y="156" font-size="18" font-weight="700" fill="#15803d" text-anchor="middle">4. Reveal</text>
    <text x="810" y="186" font-size="13" fill="#14532d" text-anchor="middle">An ASSERTION checks</text>
    <text x="810" y="204" font-size="13" fill="#14532d" text-anchor="middle">the output and FAILS.</text>
    <rect x="724" y="232" width="172" height="40" rx="8" fill="#16a34a"/>
    <text x="810" y="257" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">MUTATION SCORE</text>
    <text x="810" y="300" font-size="12" fill="#14532d" text-anchor="middle">This is the oracle. No</text>
    <text x="810" y="318" font-size="12" fill="#14532d" text-anchor="middle">assertion = no reveal,</text>
    <text x="810" y="336" font-size="12" fill="#14532d" text-anchor="middle">no matter the coverage.</text>
    <text x="810" y="380" font-size="34" text-anchor="middle">&#9989;</text>
    <text x="810" y="405" font-size="11" fill="#14532d" text-anchor="middle">Mutation testing measures THIS</text>
  </g>

  <!-- arrows -->
  <g fill="#94a3b8">
    <path d="M243 270 l14 0 l0 -8 l14 12 l-14 12 l0 -8 l-14 0 z"/>
    <path d="M463 270 l14 0 l0 -8 l14 12 l-14 12 l0 -8 l-14 0 z"/>
    <path d="M683 270 l14 0 l0 -8 l14 12 l-14 12 l0 -8 l-14 0 z"/>
  </g>

  <text x="40" y="470" font-size="14" fill="#0f172a" font-weight="600">The gap coverage hides:</text>
  <text x="40" y="494" font-size="13.5" fill="#475569">Coverage answers &#8220;did the test <tspan font-style="italic">run</tspan> this code?&#8221; &#8212; Reachability only. Mutation score answers &#8220;would the test</text>
  <text x="40" y="514" font-size="13.5" fill="#475569">actually <tspan font-style="italic">notice</tspan> if this code were wrong?&#8221; &#8212; Infection + Propagation + Reveal. That is the part you care about.</text>
</svg>
