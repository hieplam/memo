<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Visual companion: the just-in-time offer and per-question routing">
  <style>
    .proc  { fill:#eef2ff; stroke:#6366f1; stroke-width:2; }
    .start { fill:#ecfdf5; stroke:#10b981; stroke-width:2; }
    .term  { fill:#d1fae5; stroke:#059669; stroke-width:2.5; }
    .tterm { fill:#f1f5f9; stroke:#64748b; stroke-width:2; }
    .dec   { fill:#fff7ed; stroke:#f59e0b; stroke-width:2; }
    .offer { fill:#faf5ff; stroke:#a855f7; stroke-width:2.5; }
    .t     { fill:#1e293b; font-size:13px; font-weight:600; }
    .ts    { fill:#334155; font-size:11.5px; }
    .dt    { fill:#7c2d12; font-size:12px; font-weight:600; }
    .ot    { fill:#6b21a8; font-size:13px; font-weight:700; }
    .edge  { fill:none; stroke:#94a3b8; stroke-width:2; }
    .el    { fill:#475569; font-size:12px; font-weight:600; }
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <text x="30" y="32" font-size="22" font-weight="700" fill="#0f172a">Visual companion — offered just-in-time, decided per question</text>
  <text x="30" y="54" font-size="13" fill="#64748b">A tool, not a mode. Source: SKILL.md 142–159; visual-companion.md 5–25</text>

  <!-- spine edges -->
  <path class="edge" d="M340,120 L340,144" marker-end="url(#a)"/>
  <path class="edge" d="M340,208 L340,254" marker-end="url(#a)"/>
  <text class="el" x="348" y="240">yes</text>
  <path class="edge" d="M340,318 L340,360" marker-end="url(#a)"/>
  <text class="el" x="348" y="344">no</text>
  <path class="edge" d="M340,416 L340,438" marker-end="url(#a)"/>
  <path class="edge" d="M340,502 L340,544" marker-end="url(#a)"/>
  <text class="el" x="348" y="528">yes</text>

  <!-- branch edges -->
  <path class="edge" d="M220,176 L200,176" marker-end="url(#a)"/>
  <text class="el" x="226" y="168">no</text>
  <path class="edge" d="M460,286 L600,286" marker-end="url(#a)"/>
  <text class="el" x="470" y="278">yes</text>
  <path class="edge" d="M220,470 L202,470" marker-end="url(#a)"/>
  <text class="el" x="226" y="462">no</text>

  <!-- nodes -->
  <rect class="start" x="200" y="80" width="280" height="40" rx="20"/>
  <text class="t" x="340" y="105" text-anchor="middle">A brainstorming question is ready</text>

  <polygon class="dec" points="340,144 460,176 340,208 220,176"/>
  <text class="dt" x="340" y="172" text-anchor="middle">Clearer shown</text>
  <text class="dt" x="340" y="187" text-anchor="middle">than told?</text>

  <rect class="tterm" x="40" y="154" width="160" height="44" rx="10"/>
  <text class="t" x="120" y="180" text-anchor="middle">Ask in terminal</text>

  <polygon class="dec" points="340,254 460,286 340,318 220,286"/>
  <text class="dt" x="340" y="282" text-anchor="middle">Companion already</text>
  <text class="dt" x="340" y="297" text-anchor="middle">accepted?</text>

  <rect class="term" x="600" y="262" width="260" height="48" rx="10"/>
  <text class="t" x="730" y="282" text-anchor="middle">Already accepted →</text>
  <text class="ts" x="730" y="299" text-anchor="middle">browser loop (Diagram 05b)</text>

  <rect class="offer" x="180" y="360" width="320" height="56" rx="10"/>
  <text class="ot" x="340" y="384" text-anchor="middle">Offer it as its OWN message · then wait</text>
  <text class="ts" x="340" y="403" text-anchor="middle">only the offer — no question or summary alongside it</text>

  <polygon class="dec" points="340,438 460,470 340,502 220,470"/>
  <text class="dt" x="340" y="466" text-anchor="middle">Human</text>
  <text class="dt" x="340" y="481" text-anchor="middle">accepts?</text>

  <rect class="tterm" x="30" y="442" width="172" height="56" rx="10"/>
  <text class="ts" x="116" y="466" text-anchor="middle">Stay text-only;</text>
  <text class="ts" x="116" y="484" text-anchor="middle">don't re-offer unless raised</text>

  <rect class="term" x="180" y="544" width="320" height="52" rx="10"/>
  <text class="t" x="340" y="567" text-anchor="middle">Start server with --open</text>
  <text class="ts" x="340" y="585" text-anchor="middle">browser opens to first screen → loop (Diagram 05b)</text>
</svg>
