name: Deploy to GitHub Pages

# Run the bundled JS actions (checkout, configure-pages, upload-pages-artifact,
# deploy-pages) on Node 24 ahead of the Node 20 runner deprecation (forced 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup bun"
        uses: oven-sh/setup-bun@v2

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "⚙️ Configure Pages"
        uses: actions/configure-pages@v5

      - name: "🚀 Build the project"
        run: bun run build

      - name: "📤 Upload Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: "🌐 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
